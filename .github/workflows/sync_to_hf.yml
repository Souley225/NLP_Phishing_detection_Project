# Synchronise le depot GitHub vers le HF Space a chaque push sur master.
# Utilise huggingface_hub.upload_folder pour gerer les fichiers binaires (.pkl)
# sans passer par git push (rejete par HF pour les binaires depuis 2025).
#
# La configuration HF Space (frontmatter YAML) est injectee dans le README
# uniquement pour l'upload — le README du depot GitHub reste propre.
#
# Prerequis : secret GitHub HF_TOKEN avec role "write" sur sallsou/nlp-phishing-detection.

name: Sync to Hugging Face Space

on:
  push:
    branches:
      - master

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepend HF Space config to README
        run: |
          cat << 'FRONTMATTER' > /tmp/hf_readme.md
          ---
          title: NLP Phishing Detection
          colorFrom: red
          colorTo: blue
          sdk: docker
          app_port: 7860
          pinned: true
          license: mit
          short_description: Detect phishing URLs with NLP (TF-IDF + LinearSVC, F1=95.5%)
          ---

          FRONTMATTER
          cat README.md >> /tmp/hf_readme.md
          cp /tmp/hf_readme.md README.md

      - name: Sync to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install -q "huggingface_hub>=0.23"
          python -c "
          import os
          from huggingface_hub import HfApi
          api = HfApi()
          api.upload_folder(
            folder_path='.',
            repo_id='sallsou/nlp-phishing-detection',
            repo_type='space',
            token=os.environ['HF_TOKEN'],
            ignore_patterns=[
              '.git', '.github',
              '__pycache__', '**/__pycache__', '*.pyc',
              '.venv', 'venv',
              'data', 'logs', 'mlruns',
              '.env', '*.env',
            ],
          )
          print('Sync complete.')
          "
