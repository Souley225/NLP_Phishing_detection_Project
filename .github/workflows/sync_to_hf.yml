# Synchronise automatiquement le dépôt GitHub vers le HF Space à chaque push sur main.
# Prérequis : ajouter HF_TOKEN comme secret GitHub (Settings > Secrets and variables > Actions).
# Le token doit avoir le rôle "write" sur le Space sallsou/nlp-phishing-detection.

name: Sync to Hugging Face Space

on:
  push:
    branches:
      - master

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "sallsouleymane2207@gmail.com"
          git config user.name "Souleymane Sall"
          git push https://sallsou:${HF_TOKEN}@huggingface.co/spaces/sallsou/nlp-phishing-detection master:main --force
