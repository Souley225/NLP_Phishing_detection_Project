# Configuration par défaut du modèle
default:
  name: LinearSVC

  params:
    C: 0.5                    # Régularisation (0.5 évite le sur-ajustement sur texte)
    max_iter: 2000            # Suffisant pour convergence sur 355k samples
    random_state: 42
  
  # Espace de recherche Optuna
  optuna_space:
    C:
      type: loguniform
      low: 0.001
      high: 100.0
    max_iter:
      type: categorical
      choices: [500, 1000, 2000]
    solver:
      type: categorical
      choices: [liblinear, lbfgs]
    penalty:
      type: categorical
      choices: [l1, l2]
  
  # Sauvegarde
  save_name: best_model.pkl
  vectorizers:
    tfidf_word: tfidf_word.pkl
    tfidf_char: tfidf_char.pkl
    scaler: scaler.pkl